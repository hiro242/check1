<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>歩活チェックシート</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding:20px;
}

h1{
  text-align:center;
}

.item{
  background:white;
  margin:10px 0;
  padding:15px;
  border-radius:10px;
  font-size:16px;
  border:2px solid #ccc;
}

.checked{
  background:#4caf50;
  color:white;
}

button{
  width:100%;
  padding:15px;
  margin-top:20px;
  font-size:16px;
}
</style>
</head>

<body>

<h1>歩活チェックシート</h1>

<div id="list"></div>

<button onclick="clearCheck()">チェック解除</button>

<script>

const words = [
 "1.平均歩数を相手チームより上回れ！（月曜日集計）",
  "2.ぶら下がり30秒",
  "3.春の食べれる野草見つける（既出禁止）",
  "4.自分の誕生年に建造された建物を探せ（記念碑、礎の年やチャッピー情報も可能",
  "5.ウォーキングorランニング10km",
  "6.昼休み休憩３０分歩く",
  "7.朝日が昇る前に5000歩達成",
  "8.町中にある「数字（番地、看板、自販機の価格など）小さいから順番に写真でコレクション　一人1個／日　※MSDは一人だけ2つ投稿可能",
  "9.セミを見つける",
  "10.相手チームより名前が長い昆虫を見つけろ！（既出禁止）",
  "11.雨の日に15,000歩",
  "12.漢字１文字の看板をみつけよ",
  "13.１日30,000歩を達成",
  "14.相手チームより長い〇〇病院を探せ（クリニックもあり）",
  "15.一日、チーム平均20,000歩以上達成！",
  "16.名前に「色」が入った通り・交差点を通過する",
  "17.相手チームより〇〇kmの看板で合計値が大きいものを見つけよ（例　名古屋方面53km　豊橋方面30kmであれば83km)",
  "18.チームの週平均歩数を18,000歩以上（現在17,813歩91位）",
  "19.２日平均20,000歩",
  "20.アニマル生き物ハンティング（本物ではなく、オブジェを撮影する）一人1個／日　※MSDは一人だけ2つ投稿可能",
  "21.出勤前及び帰宅後１時間の散歩",
  "22.相手チームより名前が短い公園を見つけよ！",
  "23.２人組の路上ライブを撮影",
  "24.中川部長20km（30代40代10km 50代以上3km)ランorジョグ",
  "25.最寄り駅から３駅手前から帰宅"
  ];

const STORAGE_KEY = "walk_check";

const list = document.getElementById("list");

const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
}

words.forEach((word,index)=>{

  const div = document.createElement("div");
  div.className = "item";
  div.textContent = word;

  if(saved[index]){
    div.classList.add("checked");
  }

  div.onclick = ()=>{

    saved[index] = !saved[index];

    div.classList.toggle("checked");

    save();
  };

  list.appendChild(div);
});

function clearCheck(){
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

</script>

</body>
</html>
