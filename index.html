<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>歩活チェックシート</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding:20px;
}

h1{
  text-align:center;
}

.item{
  background:white;
  margin:10px 0;
  padding:15px;
  border-radius:10px;
  font-size:16px;
  border:2px solid #ccc;
}

.checked{
  background:#4caf50;
  color:white;
}

button{
  width:100%;
  padding:15px;
  margin-top:20px;
  font-size:16px;
}
</style>
</head>

<body>

<h1>歩活チェックシート</h1>

<div id="list"></div>

<button onclick="clearCheck()">チェック解除</button>

<script>

const words = [
 "1.平均歩数を相手チームより上回れ！（月曜日集計）",
  "2.階段1000段",
  "3.春の食べれる野草見つける（既出禁止）",
  "4.相手より歴史ある建造物を撮影！（年数勝負、再建は許す）",
  "5.ウォーキングorランニング10km",
  "6.昼休み休憩３０分歩く",
  "7.朝日が昇る前に5000歩達成",
  "8.同僚と歩く",
  "9.日本で初めての〇〇をみつける。",
  "10.相手チームより名前が長い昆虫を見つけろ！",
  "11.雨の日に15,000歩",
  "12.サイレンが鳴っている消防車を撮影！",
  "13.１日30,000歩を達成",
  "14.ホタルをみつけよ！",
  "15.一日、チーム平均20,000歩以上達成！",
  "16.足の生えたオタマジャクシをみつけよ！",
  "17.相手チームより名前が長い川の名前を見つけろ！",
  "18.ガソリンスタンドで３人の定員が立っている状態で撮影",
  "19.２日平均20,000歩",
  "20.相手チームより国名が長い国旗を見つけよ！（一般的な言い方の国名のみ）",
  "21.出勤前及び帰宅後１時間の散歩",
  "22.相手チームより名前が長い公園を見つけよ！",
  "23.２人組の路上ライブを撮影",
  "24.当社の踏切で漢字４文字以上の踏切をみつける",
  "25.最寄り駅から２駅手前から帰宅"
  ];

const STORAGE_KEY = "walk_check";

const list = document.getElementById("list");

const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
}

words.forEach((word,index)=>{

  const div = document.createElement("div");
  div.className = "item";
  div.textContent = word;

  if(saved[index]){
    div.classList.add("checked");
  }

  div.onclick = ()=>{

    saved[index] = !saved[index];

    div.classList.toggle("checked");

    save();
  };

  list.appendChild(div);
});

function clearCheck(){
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

</script>

</body>
</html>
