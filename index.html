<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>歩活チェックシート</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding:20px;
}

h1{
  text-align:center;
}

.item{
  background:white;
  margin:10px 0;
  padding:15px;
  border-radius:10px;
  font-size:16px;
  border:2px solid #ccc;
}

.checked{
  background:#4caf50;
  color:white;
}

button{
  width:100%;
  padding:15px;
  margin-top:20px;
  font-size:16px;
}
</style>
</head>

<body>

<h1>歩活チェックシート</h1>

<div id="list"></div>

<button onclick="clearCheck()">チェック解除</button>

<script>

const words = [
 "1.歴史を感じる建物や看板を撮影",
  "2.１日階段を1500段上る",
  "3.春の食べれる野草見つける※ヨモギ、イタドリ禁止",
  "4.ぶら下がり30秒",
  "5.3km走る※中川部長は20km 30代は10km 40代は5km",
  "6.昼休み休憩３０分歩く",
  "7.朝日が昇る前に5000歩達成",
  "8.他チームの同僚と歩く",
  "9.３人組の路上ライブを撮影",
  "10.5cm以上の昆虫を見つける※家にいるものは10cm以上",
  "11.珍しい形の雲を見つけ、名付ける",
  "12.町中の面白いフォントの看板を見つける",
  "13.１日25,000歩達成※中川部長は30,000歩を２日",
  "14.足元のマンホールデザインが特殊なもの",
  "15.街なかの危険箇所発見し、官公庁へ報告する",
  "16.両生類を見つける",
  "17.川の水面の高さ変化を証明する",
  "18.パトランプが点灯中のパトカーの真横を撮影する",
  "19.２日平均20,000歩",
  "20.ワールドカップ出場国旗（アジア・ヨーロッパ以外）を見つける",
  "21.出勤前及び帰宅後１時間の散歩",
  "22.万以上の数字が入っている公園へ行く（例：万田or萬田公園）",
  "23.ガソリンスタンドで５人の店員が立っている状態を撮影する",
  "24.他社の踏切で漢字５文字以上の踏切をみつける",
  "25.最寄り駅から２駅手前から帰宅"
  ];

const STORAGE_KEY = "walk_check";

const list = document.getElementById("list");

const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
}

words.forEach((word,index)=>{

  const div = document.createElement("div");
  div.className = "item";
  div.textContent = word;

  if(saved[index]){
    div.classList.add("checked");
  }

  div.onclick = ()=>{

    saved[index] = !saved[index];

    div.classList.toggle("checked");

    save();
  };

  list.appendChild(div);
});

function clearCheck(){
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

</script>

</body>
</html>
